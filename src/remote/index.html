<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b0f14" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.json" />
    <title>Parallel Code</title>
    <style>
      :root {
        --bg-base: #0b0f14;
        --bg-surface: #12181f;
        --bg-elevated: #1a2430;
        --border: #223040;
        --text-primary: #d7e4f0;
        --text-secondary: #9bb0c3;
        --text-muted: #678197;
        --accent: #2ec8ff;
        --accent-dim: #1a7a9e;
        --success: #2fd198;
        --warning: #ffc569;
        --danger: #ff5f73;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      body {
        background: var(--bg-base);
        color: var(--text-primary);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes slideInRight {
        from {
          transform: translateX(30px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
      @keyframes slideInLeft {
        from {
          transform: translateX(-30px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
      @keyframes slideUp {
        from {
          transform: translateY(20px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      @keyframes breathe {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
      @keyframes pulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(46, 200, 255, 0.3);
        }
        50% {
          box-shadow: 0 0 0 6px rgba(46, 200, 255, 0);
        }
      }
      @keyframes cardIn {
        from {
          transform: translateY(12px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      @keyframes shimmer {
        from {
          background-position: 200% 0;
        }
        to {
          background-position: -200% 0;
        }
      }
      @keyframes tooltipFade {
        0% {
          opacity: 0;
          transform: translateY(8px);
        }
        18%,
        78% {
          opacity: 1;
          transform: translateY(0);
        }
        100% {
          opacity: 0;
          transform: translateY(-4px);
        }
      }
      @keyframes statusPop {
        0% {
          transform: scale(0.82);
        }
        45% {
          transform: scale(1.18);
        }
        100% {
          transform: scale(1);
        }
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      .tap-feedback,
      .card-btn,
      .quick-action-btn,
      .send-btn,
      .ghost-btn,
      .surface-btn,
      .accent-btn,
      .danger-btn,
      .outline-danger-btn,
      .icon-btn {
        transform: translateZ(0);
        transition:
          transform 0.12s ease,
          filter 0.12s ease,
          background-color 0.14s ease,
          border-color 0.14s ease,
          box-shadow 0.2s ease;
      }

      .tap-feedback:active,
      .card-btn:active,
      .quick-action-btn:active,
      .send-btn:active,
      .ghost-btn:active,
      .surface-btn:active,
      .accent-btn:active,
      .danger-btn:active,
      .outline-danger-btn:active,
      .icon-btn:active {
        transform: scale(0.97);
        filter: brightness(0.93);
      }

      .tap-feedback[disabled]:active,
      .card-btn[disabled]:active,
      .quick-action-btn[disabled]:active,
      .send-btn[disabled]:active,
      .ghost-btn[disabled]:active,
      .surface-btn[disabled]:active,
      .accent-btn[disabled]:active,
      .danger-btn[disabled]:active,
      .outline-danger-btn[disabled]:active,
      .icon-btn[disabled]:active {
        transform: none;
        filter: none;
      }

      .card-btn:active {
        background: #18212b !important;
        border-color: rgba(46, 200, 255, 0.26) !important;
      }

      .ghost-btn:active {
        background: rgba(46, 200, 255, 0.08) !important;
      }

      .surface-btn:active,
      .icon-btn:active,
      .quick-action-btn:active {
        background: #15202b !important;
      }

      .accent-btn:active,
      .send-btn:active {
        background: #22b5e7 !important;
      }

      .danger-btn:active {
        background: #e45568 !important;
      }

      .outline-danger-btn:active {
        background: rgba(255, 95, 115, 0.1) !important;
        border-color: rgba(255, 95, 115, 0.55) !important;
      }

      .tap-feedback:focus-visible,
      .card-btn:focus-visible,
      .quick-action-btn:focus-visible,
      .send-btn:focus-visible,
      .ghost-btn:focus-visible,
      .surface-btn:focus-visible,
      .accent-btn:focus-visible,
      .danger-btn:focus-visible,
      .outline-danger-btn:focus-visible,
      .icon-btn:focus-visible,
      .command-input:focus-visible,
      a:focus-visible {
        outline: none;
        box-shadow:
          0 0 0 2px rgba(46, 200, 255, 0.18),
          0 0 0 4px rgba(46, 200, 255, 0.08);
      }

      .command-input {
        transition:
          border-color 0.16s ease,
          box-shadow 0.18s ease,
          background-color 0.16s ease;
      }

      .command-input:focus {
        border-color: rgba(46, 200, 255, 0.72) !important;
        box-shadow:
          0 0 0 3px rgba(46, 200, 255, 0.14),
          0 0 18px rgba(46, 200, 255, 0.12);
      }

      .command-input::placeholder {
        color: #678197;
      }

      .status-indicator {
        transition:
          background-color 0.22s ease,
          box-shadow 0.22s ease,
          transform 0.22s ease,
          opacity 0.22s ease;
      }

      .status-flash-a,
      .status-flash-b {
        animation: statusPop 0.42s ease-out;
      }

      .skeleton-block {
        background: linear-gradient(
          90deg,
          rgba(26, 36, 48, 0.68) 0%,
          rgba(46, 200, 255, 0.08) 50%,
          rgba(26, 36, 48, 0.68) 100%
        );
        background-size: 200% 100%;
        animation: shimmer 1.3s linear infinite;
      }

      .empty-state-pulse {
        animation: pulse 2.2s ease-in-out infinite;
      }

      .font-toast {
        animation: tooltipFade 0.95s ease-out both;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="./index.tsx" type="module"></script>
  </body>
</html>
